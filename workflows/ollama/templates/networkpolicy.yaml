{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ollama.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- include "ollama.networkPolicy.ingress" . | nindent 2 }}
  egress:
    {{- include "ollama.networkPolicy.egress.dns" . | nindent 4 }}
    {{- include "ollama.networkPolicy.egress.external" . | nindent 4 }}
{{- end }}

